name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hirnd

jobs:
  # ── Build static hirnd binaries ─────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools protobuf-compiler

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler gcc-aarch64-linux-gnu musl-tools
          # Install musl cross-compiler for aarch64
          curl -sSL https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar xz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
        run: cargo build --release --bin hirnd --target ${{ matrix.target }}

      - name: Package binary
        run: |
          BINARY=target/${{ matrix.target }}/release/hirnd
          ARCHIVE=hirnd-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname "$BINARY")" hirnd
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: hirnd-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── Docker image ────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Python wheels (maturin) ─────────────────────────────────────────────────
  python-wheels:
    name: Python ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/hirn-python/Cargo.toml
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.target }}
          path: dist/*.whl

  # ── Python sdist ────────────────────────────────────────────────────────────
  python-sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/hirn-python/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  # ── Publish Python to PyPI ──────────────────────────────────────────────────
  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: [python-wheels, python-sdist]
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist

      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  # ── Node.js native module (napi-rs) ─────────────────────────────────────────
  node-build:
    name: Node.js ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            node-arch: linux-x64-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            node-arch: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2
        with:
          key: node-${{ matrix.target }}

      - name: Build native module
        working-directory: crates/hirn-node
        run: |
          npm install
          cargo build --release -p hirn-node --target ${{ matrix.target }}

      - name: Copy artifact
        run: |
          cp target/${{ matrix.target }}/release/libhirn_node.dylib crates/hirn-node/hirn.${{ matrix.node-arch }}.node 2>/dev/null || \
          cp target/${{ matrix.target }}/release/libhirn_node.so crates/hirn-node/hirn.${{ matrix.node-arch }}.node

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.node-arch }}
          path: crates/hirn-node/hirn.${{ matrix.node-arch }}.node

  # ── Publish Node.js to npm ──────────────────────────────────────────────────
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [node-build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: crates/hirn-node

      - name: Publish
        working-directory: crates/hirn-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish Cargo crates ────────────────────────────────────────────────────
  publish-cargo:
    name: Publish crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Order matters: publish leaf deps first, then dependents.
          # Excluded: hirn-python (PyPI), hirn-node (npm), hirn-bench (internal).
          for crate in hirn-core hirn-graph hirn-query hirn-storage hirn-provider hirn-policy hirn-exec hirn-engine hirn hirnd; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty || true
            sleep 20  # crates.io index propagation
          done

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, docker, publish-pypi, publish-npm, publish-cargo]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: hirnd-*
          merge-multiple: true
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
